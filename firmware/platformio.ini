; firmware/platformio.ini
; PlatformIO 配置 - Teensy 4.1 混音台控制器固件
; 编译命令: pio run
; 烧录命令: pio run --target upload

[env:teensy41]
platform  = teensy
board     = teensy41
framework = arduino

; USB 模式：Serial + MIDI（在 Arduino IDE 中对应 "Serial + MIDI"）
build_flags =
    -DUSB_MIDI_SERIAL
    -DLAYOUT_US_ENGLISH
    -std=gnu++17
    -DARDUINO_TEENSY41

; 库依赖
lib_deps =
    ; 编码器（Paul Stoffregen）
    paulstoffregen/Encoder @ ^1.4.4
    ; OLED 驱动
    adafruit/Adafruit GFX Library @ ^1.11.9
    adafruit/Adafruit SSD1306 @ ^2.5.9
    ; WS2812B LED
    fastled/FastLED @ ^3.6.0

; 串口监视器波特率
monitor_speed = 115200

; 编译优化（Teensy 4.1 资源充足，可开 O2）
build_unflags = -Os
build_flags  +=
    -O2
